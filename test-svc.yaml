apiVersion: v1 
kind: Service
metadata:
  name: test-svc 
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      name: http
      port: 80
      targetPort: 80
      nodePort: 32000
    - protocol: TCP
      name: https 
      port: 443 
      targetPort: 443
      nodePort: 32001
